# AI-Native E-Commerce Dashboard — Development Environment
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ecom-postgres
    environment:
      POSTGRES_DB: ecom_dashboard
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom -d ecom_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecom-network

  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecom-network

  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: ecom-milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    networks:
      - ecom-network

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ecom-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379
    networks:
      - ecom-network

  minio:
    image: minio/minio:latest
    container_name: ecom-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    networks:
      - ecom-network

networks:
  ecom-network:
    driver: bridge

volumes:
  postgres_data:
  milvus_data:
  etcd_data:
  minio_data:
